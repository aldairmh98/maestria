<!DOCTYPE html>
<html style="height: 100%; width: 100%" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aldair's Pizza Restaurant</title>
    <script>
        window.watsonAssistantChatOptions = {
            integrationID: "1862c8da-f7fc-42a6-b6be-215f58434e06", // The ID of this integration.
            region: "https://integrations.us-south.assistant.watson.appdomain.cloud", // The region your integration is hosted in.
            serviceInstanceID: "d1724911-9875-451b-a44f-6ea45b6936ec", // The ID of your service instance.
            onLoad: async(instance) => {
                await instance.render();
            }
        };
        setTimeout(function() {
            const t = document.createElement('script');
            t.src = "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
            document.head.appendChild(t);
        });
    </script>
</head>

<body style="background-color: black; display: flex; flex-direction: column; justify-content: center;align-items: center; height: 100%; width: 100%;">
    <h1 style="color: #fff">Pitsa Pitsa!</h1>
    <h2 style="color: #fff;">Talk to our chatbot on the bubble</h2>
</body>

</html>
